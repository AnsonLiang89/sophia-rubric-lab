    <!--
      GitHub Pages SPA 路由兼容：当用户刷新或直接访问 /sophia-rubric-lab/queries/xxx
      时 GitHub Pages 会先返回 404.html。我们在 404.html 里把路径编码到 query
      string 再跳回 index.html，这里把它解回 history.replaceState 让 React Router
      接住。参考 rafgraph/spa-github-pages。
    -->
    <script>
      (function () {
        var l = window.location;
        if (l.search && l.search.indexOf("?/") === 0) {
          var hash = l.hash || "";
          var decoded = l.search
            .slice(2)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
