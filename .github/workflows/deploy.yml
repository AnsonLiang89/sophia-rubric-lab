name: Deploy to GitHub Pages

on:
  # main 分支每次 push 自动部署
  push:
    branches: [main]
  # 手动触发兜底
  workflow_dispatch:

# Pages 部署需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只保留一次部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint outbox schema (fail-fast)
        run: npm run lint:outbox

      - name: Run unit tests
        run: npm test

      - name: Build public snapshot
        # VITE_PUBLIC_BASE 匹配 GitHub Pages Project 站点 URL 前缀
        env:
          VITE_PUBLIC_BASE: /sophia-rubric-lab/
        run: npm run build:public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
